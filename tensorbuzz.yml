before_install:
  - sudo mkdir -p /etc/apt/keyrings
  - curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --no-tty --batch --yes --dearmor -o /etc/apt/keyrings/nodesource.gpg
  - echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_24.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list
  - sudo apt-get update
  - sudo apt-get install -y nodejs
before_script:
  - git clean -fd spec src
  - git clean -fdx spec/dummy/db
  - npm install
environment:
  NODE_ENV: test
  VELOCIOUS_TEST_DIR: /home/build/project/spec
builds:
  lint:
    name: Lint
    script:
      - cp spec/dummy/src/config/configuration.peakflow.sqlite.js spec/dummy/src/config/configuration.js
      - sleep 5
      - npm run lint
      - npm run typecheck
      - npm run fallow
  browser_tests:
    name: Browser Tests
    script:
      - cp spec/dummy/src/config/configuration.peakflow.sqlite.js spec/dummy/src/config/configuration.js
      - npm run test:browser
  mariadb_1:
    depends_on:
      - mariadb
    name: "MariaDB (1/3)"
    services:
      mariadb: &mariadb_service
        environment:
          MYSQL_USER: peakflow
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: velocious_test
        healthcheck:
          test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
          interval: 10s
          timeout: 5s
          retries: 12
          start_period: 30s
        image: mariadb:latest
        expose:
          - 3306
        mem_limit: 4096m
        restart_policy: on-failure
    script:
      - cp spec/dummy/src/config/configuration.peakflow.mariadb.js spec/dummy/src/config/configuration.js
      - wait-for-it mariadb:3306
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 1
  mariadb_2:
    depends_on:
      - mariadb
    name: "MariaDB (2/3)"
    services:
      mariadb: *mariadb_service
    script:
      - cp spec/dummy/src/config/configuration.peakflow.mariadb.js spec/dummy/src/config/configuration.js
      - wait-for-it mariadb:3306
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 2
  mariadb_3:
    depends_on:
      - mariadb
    name: "MariaDB (3/3)"
    services:
      mariadb: *mariadb_service
    script:
      - cp spec/dummy/src/config/configuration.peakflow.mariadb.js spec/dummy/src/config/configuration.js
      - wait-for-it mariadb:3306
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 3
  mssql_1:
    depends_on:
      - mssql
    name: "MS-SQL (1/3)"
    services:
      mssql: &mssql_service
        environment:
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: Super-Secret-Password
        healthcheck:
          test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" -b -o /dev/null || exit 1"]
          interval: 10s
          timeout: 10s
          retries: 20
          start_period: 300s
        healthcheck_restart_delay: 60
        healthcheck_restart_limit: 20
        image: mcr.microsoft.com/mssql/server:2022-latest
        expose:
          - 1433
        mem_limit: 4096m
        restart_policy: on-failure
        ulimits:
          nofile:
            soft: 262144
            hard: 262144
    script:
      - cp spec/dummy/src/config/configuration.peakflow.mssql.js spec/dummy/src/config/configuration.js
      - wait-for-it -t 120 mssql:1433
      - sleep 5
      - cd spec/dummy && node ../../bin/velocious.js db:create
      - cd spec/dummy && node ../../bin/velocious.js db:migrate
      - cd spec/dummy && node ../../bin/velocious.js g:base-models
      - npm run test -- --groups 3 --group-number 1
  mssql_2:
    depends_on:
      - mssql
    name: "MS-SQL (2/3)"
    services:
      mssql: *mssql_service
    script:
      - cp spec/dummy/src/config/configuration.peakflow.mssql.js spec/dummy/src/config/configuration.js
      - wait-for-it -t 120 mssql:1433
      - sleep 5
      - cd spec/dummy && node ../../bin/velocious.js db:create
      - cd spec/dummy && node ../../bin/velocious.js db:migrate
      - cd spec/dummy && node ../../bin/velocious.js g:base-models
      - npm run test -- --groups 3 --group-number 2
  mssql_3:
    depends_on:
      - mssql
    name: "MS-SQL (3/3)"
    services:
      mssql: *mssql_service
    script:
      - cp spec/dummy/src/config/configuration.peakflow.mssql.js spec/dummy/src/config/configuration.js
      - wait-for-it -t 120 mssql:1433
      - sleep 5
      - cd spec/dummy && node ../../bin/velocious.js db:create
      - cd spec/dummy && node ../../bin/velocious.js db:migrate
      - cd spec/dummy && node ../../bin/velocious.js g:base-models
      - npm run test -- --groups 3 --group-number 3
  pgsql_1:
    depends_on:
      - postgres
    name: "PG-SQL (1/3)"
    services:
      postgres: &postgres_service
        environment:
          POSTGRES_USER: peakflow
          POSTGRES_PASSWORD: password
          POSTGRES_DB: velocious_test
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $POSTGRES_USER -d $POSTGRES_DB"]
          interval: 10s
          timeout: 5s
          retries: 12
          start_period: 10s
        image: postgres:17.6
        expose:
          - 5432
        mem_limit: 4096m
        restart_policy: on-failure
    script:
      - cp spec/dummy/src/config/configuration.peakflow.pgsql.js spec/dummy/src/config/configuration.js
      - wait-for-it postgres:5432
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 1
  pgsql_2:
    depends_on:
      - postgres
    name: "PG-SQL (2/3)"
    services:
      postgres: *postgres_service
    script:
      - cp spec/dummy/src/config/configuration.peakflow.pgsql.js spec/dummy/src/config/configuration.js
      - wait-for-it postgres:5432
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 2
  pgsql_3:
    depends_on:
      - postgres
    name: "PG-SQL (3/3)"
    services:
      postgres: *postgres_service
    script:
      - cp spec/dummy/src/config/configuration.peakflow.pgsql.js spec/dummy/src/config/configuration.js
      - wait-for-it postgres:5432
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 3
  sqlite_1:
    name: "SQLite (1/3)"
    script:
      - cp spec/dummy/src/config/configuration.peakflow.sqlite.js spec/dummy/src/config/configuration.js
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 1
  sqlite_2:
    name: "SQLite (2/3)"
    script:
      - cp spec/dummy/src/config/configuration.peakflow.sqlite.js spec/dummy/src/config/configuration.js
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 2
  sqlite_3:
    name: "SQLite (3/3)"
    script:
      - cp spec/dummy/src/config/configuration.peakflow.sqlite.js spec/dummy/src/config/configuration.js
      - sleep 5
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:create
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js db:migrate
      - cd spec/dummy && VELOCIOUS_DISABLE_MSSQL=1 node ../../bin/velocious.js g:base-models
      - VELOCIOUS_DISABLE_MSSQL=1 npm run test -- --groups 3 --group-number 3
  expo_build:
    name: Expo Build
    script:
      - npm run test:expo
